                        orbitron: ['Orbitron', 'sans-serif'],

                        'float': 'float 4s ease-in-out infinite',

                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',

                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },

    <style>
        :root {
            --bg-dark: #050505;
            --primary: #ff00ff;
            --secondary: #00f3ff;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            overflow-x: hidden;
            font-family: 'Roboto Mono', monospace;
            cursor: none;
        }

        /* Digital Rain Canvas */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-circle {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }
        .cursor-dot {
            width: 8px; height: 8px;
            background-color: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
        }
        .cursor-circle {
            width: 40px; height: 40px;
            border: 1px solid var(--primary);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
        }
        body:hover .cursor-circle {
            width: 60px; height: 60px;
            border-color: var(--secondary);
            opacity: 0.5;
        }

        /* Filter Tab */
        .filter-tab {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        
        .filter-tab.active {
            background: rgba(255, 0, 255, 0.2);
            color: var(--secondary);
            border-color: var(--secondary);
            text-shadow: 0 0 8px var(--secondary);
        }
        
        .filter-tab::before {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 2px;
            background: var(--primary); transition: width 0.3s;
        }
        .filter-tab:hover::before { width: 100%; }

        /* 3D Holographic Card */
        .card-wrapper {
            perspective: 1000px;
        }
        
        .project-card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.2), inset 0 0 15px rgba(0, 243, 255, 0.1);
            border-color: var(--primary);
        }

        .scanner-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(0, 243, 255, 0.1), transparent);
            transform: translateY(-100%);
            pointer-events: none;
            z-index: 10;
        }
        .project-card:hover .scanner-bar {
            animation: scanline 1.5s linear infinite;
        }

        .tech-tag {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .project-card:hover .tech-tag {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 5px var(--secondary);
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-hover:hover {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: var(--primary);
        }

        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out;
        }
        .loader-bar {
            width: 200px; height: 4px; background: #333; margin-top: 20px;
            position: relative; overflow: hidden;
        }
        .loader-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
            animation: load 1.5s ease-in-out forwards;
        }
        @keyframes load { 100% { width: 100%; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 3px; }
    </style>
</head>

    <script>
        // =====================================================================
        // BACKEND CONFIGURATION (GOOGLE SHEETS)
        // =====================================================================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIpJOx4s6HUdmu0g_40rIhTp5kf496pOEaISloWbx3egZNo5B5VCBkoIfwqyNKPcEcVDT2vR0TGJy/pub?output=csv"; 

        // Fallback Data
        let projects = {
            'safety': {
                title: "Women Safety Wearable Device",
                img: "https://i.ibb.co/TMZ443tJ/women-safety-device-banner.jpg",
                shortDesc: "IoT-based dual module safety system with alerts and static deterrent.",

                tech: ["ESP32", "ESP8266", "GPS/GSM", "Sensors", "C++"],
                link: "WOMEN_SAFETY_DEVICE.html",

                badgeText: "HARDWARE",
                badgeColor: "pink",

            },
            'aqua': {

                shortDesc: "Biomimetic robot mimicking fish movement for stealthy underwater surveillance.",
                mainDesc: "Biomimetic robot designed to mimic fish movement for stealthy underwater surveillance. Equipped with ESP32-CAM for live streaming and sensors for monitoring water quality metrics like pH and turbidity.",
                tech: ["ESP32-CAM", "Servo Motors", "Biomimicry", "Robotics"],
                link: "https://github.com/jeyaram1023/Fish-Robot-Aqua-bot-X-/",
                category: "hardware",
                badgeText: "ROBOTICS",
                badgeColor: "cyan",
                vip: false
            },
            'streetr': {
                title: "Street R Native Mobile App",
                img: "https://i.ibb.co/0yfqxpVW/68747470733a2f2f75706c6f6164732e6f6e65636f6d70696c65722e696f2f3432713565327072352f34336d34743564646b.png",
                shortDesc: "User-friendly platform for customers to place orders and discover street services.",
                mainDesc: "The Streeter customer app is a user-friendly platform that lets customers easily place orders, track deliveries, and manage their accounts in real time. It focuses on convenience, seamless navigation, and a smooth overall user experience.",
                tech: ["HTML", "CSS", "JS", "supabase","startup idea"],
                link: "https://github.com/jeyaram1023/StreetR-customer-app-.git",
                category: "software",
                badgeText: "Start-up",
                badgeColor: "green",
                vip: true
            },
            'wheelchair': {
                title: "Smart Wheelchair",
                img: "https://i.ibb.co/ks2BNWxk/wheelchair-img.jpg",
                shortDesc: "Assistive mobility solution utilizing voice and eye-based control algorithms.",
                mainDesc: "Smart Wheelchair Project addresses the challenge of dependent mobility faced by people with disabilities. Before technology, movement required constant assistance and limited control. With eye-tracking and voice-based control through a mobile application, users can now operate the wheelchair independently. This solution transforms mobility into a dignified, user-controlled experience.",
                tech: ["Raspberry Pi", "NodeMCU", "Bluetooth", "Sensors", "Android studio"],
                link: "#",
                category: "hardware",
                badgeText: "HARDWARE",
                badgeColor: "yellow",
                vip: true
            },
            'n8n': {
                title: "n8n Automation Pipelines",
                img: "https://i.ibb.co/hxL6HYVp/517456652-7bc232be-b878-40e0-817a-23899b9f5cff.png",
                shortDesc: "Automated Stock Market Analyst built using n8n and AI chart analysis.",
                mainDesc: "Designed and maintained complex workflow automations using n8n. Integrated various APIs to preprocess datasets for ML models and automate reporting tasks.",
                tech: ["n8n", "JSON", "APIs", "Webhooks"],
                link: "https://github.com/jeyaram1023/stock-market-analyst-n8n.git",
                category: "n8n",
                badgeText: "AUTOMATION",
                badgeColor: "orange",
                vip: false
            },
            'android': {
                title: "Smart Home Controller App",
                img: "https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?w=500",
                shortDesc: "Android application designed to interface with custom IoT hardware setups.",
                mainDesc: "A native Android application designed to interface with IoT projects. Allows users to toggle switches, view sensor data in real-time, and manage device settings via Firebase.",
                tech: ["Android Studio", "Java/Kotlin", "Firebase"],
                link: "#",
                category: "android",
                badgeText: "ANDROID",
                badgeColor: "purple",
                vip: false
            }
        };

        // Utility Function to Shuffle an Array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Fetch and Render Data ---
        function loadDatabase() {
            if (!SHEET_CSV_URL || SHEET_CSV_URL.trim() === "") {
                console.log("No Google Sheet URL provided. Using local fallback data.");
                renderProjects();
                finishLoading();
                return;
            }

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const fetchedProjects = {};
                    results.data.forEach(row => {
                        if (row.id && row.title) {
                            fetchedProjects[row.id] = {
                                title: row.title,
                                img: row.image_url,
                                // Separate short and main descriptions
                                shortDesc: row.short_description || row.description || '',
                                mainDesc: row.main_description || row.description || '',
                                tech: row.technologies ? row.technologies.split(',').map(t => t.trim()) : [],
                                link: row.link,
                                category: row.category,
                                badgeText: row.badge_text,
                                badgeColor: row.badge_color || 'cyan',
                                // Parse VIP yes/no
                                vip: (row.vip && row.vip.trim().toLowerCase() === 'yes')
                            };
                        }
                    });
                    
                    if (Object.keys(fetchedProjects).length > 0) {
                        projects = fetchedProjects; // Override fallback with live data
                    }
                    renderProjects();
                    finishLoading();
                },
                error: function(error) {
                    console.error("Failed to fetch Google Sheet CSV:", error);
                    document.getElementById('loading-text').innerText = "Fetch failed. Using local cache...";
                    renderProjects(); 
                    setTimeout(finishLoading, 1000);
                }
            });
        }

        function renderProjects() {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = ''; 

            // Convert projects dictionary to array and shuffle it
            let shuffledProjects = shuffleArray(Object.entries(projects));

            for (const [id, project] of shuffledProjects) {
                const colorClass = project.badgeColor || 'cyan'; 
                
                // Construct VIP Badge HTML if the project is marked VIP
                const vipBadgeHTML = project.vip 
                    ? `<div class="absolute top-3 left-3 bg-black/80 border border-yellow-500 text-yellow-400 text-[10px] font-orbitron px-2 py-1 rounded backdrop-blur-md flex items-center gap-1 shadow-[0_0_10px_rgba(250,204,21,0.5)] z-20"><i class="fas fa-crown"></i> VIP</div>` 
                    : '';
                
                const cardHTML = `
                    <div class="card-wrapper project-item" data-category="${project.category}">
                        <div class="project-card rounded-xl overflow-hidden group cursor-pointer h-full flex flex-col" onclick="openModal('${id}')">
                            <div class="scanner-bar"></div>
                            <div class="relative h-48 overflow-hidden bg-black shrink-0">
                                ${vipBadgeHTML}
                                <img src="${project.img}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-80 group-hover:opacity-100" onerror="this.src='https://via.placeholder.com/500x300?text=No+Image'">
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                                <div class="absolute top-3 right-3 bg-black/80 border border-${colorClass}-500 text-${colorClass}-400 text-[10px] font-orbitron px-2 py-1 rounded backdrop-blur-md uppercase z-20">${project.badgeText}</div>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-xl font-orbitron font-bold text-white mb-2 group-hover:text-${colorClass}-400 transition-colors line-clamp-2">${project.title}</h3>
                                <!-- Replaced with project.shortDesc -->
                                <p class="text-gray-400 text-xs font-mono mb-4 line-clamp-3 flex-grow">${project.shortDesc}</p>
                                <div class="flex flex-wrap gap-2 mt-auto">
                                    ${project.tech.slice(0, 3).map(t => `<span class="tech-tag text-[10px] text-cyan-300 px-2 py-1 rounded font-mono">${t}</span>`).join('')}
                                    ${project.tech.length > 3 ? `<span class="tech-tag text-[10px] text-gray-500 px-2 py-1 rounded font-mono">+${project.tech.length - 3}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }
            
            initTiltEffect(); 
        }

        // --- Custom Cursor Logic ---
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorCircle = document.querySelector('.cursor-circle');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            cursorCircle.style.left = `${posX}px`;
            cursorCircle.style.top = `${posY}px`;
        });

        // --- Matrix Rain Effect ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillStyle = Math.random() > 0.5 ? "#22d3ee" : "#ff00ff";
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- Confetti Effect ---
        function fireConfetti() {
            var myConfetti = confetti.create(document.getElementById('confetti-canvas'), {
                resize: true,
                useWorker: true
            });

            myConfetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff00ff', '#00f3ff', '#39ff14', '#facc15'],
                disableForReducedMotion: true
            });
        }

        // --- Loading Flow ---
        function finishLoading() {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    fireConfetti();
                }, 500);
            }, 800);
        }

        // Start data fetching when window loads
        window.addEventListener('load', loadDatabase);

        // --- Filter Logic ---
        const tabs = document.querySelectorAll('.filter-tab');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const filter = tab.dataset.filter;
                const items = document.querySelectorAll('.project-item');
                let delayCounter = 0;

                items.forEach(item => {
                    const card = item.querySelector('.project-card');
                    if (filter === 'all' || item.dataset.category === filter) {
                        item.style.display = 'block';
                        card.style.animation = 'none';
                        card.offsetHeight;
                        card.style.animation = `modalZoom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards`;
                        card.style.animationDelay = `${delayCounter * 0.1}s`;
                        delayCounter++;
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // --- 3D Tilt Logic ---
        function initTiltEffect() {
            const cards = document.querySelectorAll('.project-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -5; 
                    const rotateY = ((x - centerX) / centerX) * 5;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
                });
            });
        }

        // --- Modal Logic ---
        const modal = document.getElementById('project-modal');
        const modalContent = document.getElementById('modal-content');

        function openModal(id) {
            const project = projects[id];
            if (!project) return;
            
            const btnColor = project.badgeColor || 'pink';

            modalContent.innerHTML = `
                <div class="relative h-64 overflow-hidden shrink-0">
                    <img src="${project.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'">
                    <div class="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-6 w-full">
                        <h2 class="text-3xl font-orbitron font-bold text-white drop-shadow-lg glitch-hover">${project.title}</h2>
                        <div class="h-1 w-20 bg-${btnColor}-500 mt-2"></div>
                    </div>
                </div>
                <div class="p-8 bg-gray-900 flex-grow overflow-auto">
                    <!-- Replaced with project.mainDesc -->
                    <p class="text-gray-300 font-mono leading-relaxed mb-6 text-sm md:text-base border-l-2 border-cyan-500 pl-4">${project.mainDesc}</p>
                    
                    <div class="mb-8">
                        <h4 class="text-cyan-400 font-orbitron text-xs tracking-widest mb-3 border-b border-gray-800 pb-2">SYSTEM_COMPONENTS</h4>
                        <div class="flex flex-wrap gap-2">
                            ${project.tech.map(t => `<span class="px-3 py-1 bg-gray-800 border border-gray-600 rounded text-cyan-300 text-xs font-mono hover:bg-cyan-900/30 transition-colors cursor-default">${t}</span>`).join('')}
                        </div>
                    </div>

                    <a href="${project.link}" target="_blank" class="group block w-full text-center py-4 bg-transparent border border-${btnColor}-500 text-${btnColor}-400 font-orbitron font-bold rounded-sm hover:bg-${btnColor}-500 hover:text-black transition-all relative overflow-hidden">
                        <span class="relative z-10">ACCESS SOURCE CODE <i class="fas fa-code-branch ml-2"></i></span>
                        <div class="absolute inset-0 bg-${btnColor}-500 transform -translate-x-full group-hover:translate-x-0 transition-transform duration-300 z-0"></div>
                    </a>
                </div>
            `;
            
            modal.classList.remove('hidden');
            const contentDiv = modal.querySelector('.relative');
            contentDiv.style.animation = 'none';
            contentDiv.offsetHeight;
            contentDiv.style.animation = 'modalZoom 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' },
                        neon: { blue: '#00f3ff', green: '#39ff14', purple: '#bc13fe' }
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 2.5s linear infinite',
                        'modal-pop': 'modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'spin-slow': 'spin 15s linear infinite',
                        'reverse-spin': 'reverseSpin 1.5s linear infinite',
                        'spin-fast': 'spin 0.8s linear infinite',
                    },
                    keyframes: {
                        scan: {
                            '0%': { top: '-10%', opacity: '0' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { top: '110%', opacity: '0' },
                        },
                        modalPop: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        reverseSpin: {
                            '0%': { transform: 'rotate(360deg)' },
                            '100%': { transform: 'rotate(0deg)' },
                        }
                    }
                }
            }
        }

    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #39ff14;
            --bg-dark: #050505;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #000000 100%);
        }

        /* --- Custom Loader Styles --- */
        #loader {
            transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
        }
        .hexagon-core {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .glitch-text {
            position: relative;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
        }
        .glitch-text::before {
            left: 2px; text-shadow: -1px 0 red; animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px; text-shadow: -1px 0 blue; animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim-1 { 0% { clip: rect(20px, 9999px, 15px, 0); } 100% { clip: rect(80px, 9999px, 5px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(50px, 9999px, 30px, 0); } 100% { clip: rect(10px, 9999px, 80px, 0); } }

        .loading-dots::after {
            content: ''; animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }

        /* Cyber Moon Styles */
        .moon-container {
            position: fixed; top: 5%; right: 5%; z-index: -1; pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        .cyber-moon {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e2e8f0 10%, #475569 60%, #0f172a 100%);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(0, 243, 255, 0.2), inset -10px -10px 20px rgba(0, 0, 0, 0.8);
            position: relative; animation: moonPulse 8s infinite alternate;
        }

        .moon-crater {
            position: absolute; background: rgba(0, 0, 0, 0.15); border-radius: 50%;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3);
        }

        .orbital-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 1px dashed rgba(0, 243, 255, 0.15); pointer-events: none;
        }

        @keyframes moonPulse {
            0% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(0, 243, 255, 0.2); }
            100% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 80px rgba(0, 243, 255, 0.4); }
        }

        @media (max-width: 768px) {
            .moon-container { top: 2%; right: -10%; transform: scale(0.6); }
        }

        /* 3D Card Effect */
        .cert-card-wrapper { perspective: 1000px; }
        
        .cert-card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            position: relative; overflow: hidden;
        }

        .cert-card:hover { box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); border-color: var(--primary); }

        .cert-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            z-index: 2; pointer-events: none;
        }

        .holo-shine {
            position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(0, 243, 255, 0.1) 45%, rgba(0, 243, 255, 0.3) 50%, transparent 54%);
            filter: blur(5px); transform: skewX(-20deg) translateX(-150%);
            transition: transform 0.5s; pointer-events: none; z-index: 3;
        }

        .cert-card:hover .holo-shine {
            transform: skewX(-20deg) translateX(150%); transition: transform 1s ease-in-out;
        }

        .scanner-bar {
            position: absolute; width: 100%; height: 10px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            opacity: 0; z-index: 4; pointer-events: none;
        }

        .cert-card:hover .scanner-bar { animation: scan 1.5s ease-in-out infinite; opacity: 0.7; }

        .filter-btn.active {
            background-color: rgba(0, 243, 255, 0.2); border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary); color: white;
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(30px);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <script>
        // ==========================================
        // CONFIG & DATA
        // ==========================================
        // Paste your published Google Sheets CSV URL here
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQDMuMVhiYPlgC0Rm5JOy-1_ZTD7djXzncBSFZ10rl_t92hWxjAzCUeKLJl2tOcd9wuDtzMKLqVQI1K/pub?output=csv"; 

        // Fallback Data
        let certificatesRaw = {
            'cert1': {
                title: "IoT & Embedded Systems", category: "tech", icon: "fas fa-microchip", color: "cyan", vip: true,
                img: "https://placehold.co/600x400/05101a/22d3ee?text=IoT+System+Design&font=orbitron",
                desc: "Comprehensive certification in developing smart connected devices, sensor integration, and embedded logic programming.", tagText: "VERIFIED ID: IOT-2024"
            },
            'cert2': {
                title: "Python Programming", category: "tech", icon: "fab fa-python", color: "green", vip: false,
                img: "https://placehold.co/600x400/051a05/39ff14?text=Python+Programming&font=orbitron",
                desc: "Advanced programming certification focusing on data structures, automation scripts, and algorithm efficiency.", tagText: "VERIFIED ID: PY-2023"
            },
            'cert3': {
                title: "RBI State Level Quiz", category: "achieve", icon: "fas fa-trophy", color: "purple", vip: true,
                img: "https://placehold.co/600x400/1a051a/bc13fe?text=RBI+State+Quiz&font=orbitron",
                desc: "State-level recognition for excellence in financial awareness and economic knowledge competition.", tagText: "MERIT AWARD"
            },
            'cert4': {
                title: "QIS Project Expo", category: "achieve", icon: "fas fa-lightbulb", color: "yellow", vip: false,
                img: "https://placehold.co/600x400/292503/facc15?text=Project+Expo&font=orbitron",
                desc: "Showcased innovative hardware solutions. Recognized for creativity and practical application in engineering.", tagText: "EXCELLENCE"
            },
            'cert5': {
                title: "Group Discussion", category: "soft", icon: "fas fa-users", color: "blue", vip: false,
                img: "https://placehold.co/600x400/031529/3b82f6?text=Group+Dynamics&font=orbitron",
                desc: "Certified in effective communication, critical thinking, and collaborative problem-solving in group dynamics.", tagText: "SOFT SKILL"
            }
        };

        // Fisher-Yates Shuffle Algorithm to Randomize the Grid
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ==========================================
        // LIGHTNING-FAST FETCH & RENDER LOGIC
        // ==========================================
        function loadDatabase() {
            if (!SHEET_CSV_URL || SHEET_CSV_URL.trim() === "") {
                processAndRender(certificatesRaw);
                hideLoader();
                return;
            }

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const fetchedCerts = {};
                    results.data.forEach(row => {
                        if (row.id && row.title) {
                            fetchedCerts[row.id] = {
                                title: row.title,
                                category: row.category,
                                icon: row.icon || 'fas fa-certificate',
                                img: row.image_url,
                                desc: row.description,
                                tagText: row.tag_text,
                                color: row.color || 'cyan',
                                vip: (row.vip && row.vip.trim().toLowerCase() === 'yes')
                            };
                        }
                    });
                    
                    processAndRender(Object.keys(fetchedCerts).length > 0 ? fetchedCerts : certificatesRaw);
                    hideLoader(); // Hide loader the absolute instant data is parsed
                },
                error: function(error) {
                    console.error("Failed to fetch Google Sheet CSV:", error);
                    processAndRender(certificatesRaw); 
                    hideLoader();
                }
            });
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            setTimeout(() => {
                loader.style.display = 'none';
                fireConfettiSequence();
            }, 300); // Only wait for the CSS fade-out transition
        }

        function processAndRender(dataObj) {
            const grid = document.getElementById('cert-grid');
            grid.innerHTML = ''; 

            let shuffledCerts = shuffleArray(Object.entries(dataObj));
            let delay = 0.05;

            shuffledCerts.forEach(([id, cert]) => {
                const vipBadge = cert.vip 
                    ? `<div class="absolute top-2 left-2 bg-black/80 backdrop-blur-md border border-yellow-500/50 text-yellow-400 text-[10px] font-orbitron px-2 py-1 rounded shadow-[0_0_15px_rgba(250,204,21,0.5)] z-20"><i class="fas fa-star animate-pulse mr-1"></i> VIP</div>` 
                    : '';

                const cardHTML = `
                    <div class="cert-card-wrapper cert-item fade-in-up" style="animation-delay: ${delay}s;" data-category="${cert.category}">
                        <div class="cert-card rounded-xl p-4 h-full flex flex-col group cursor-pointer" onclick="openModal(event, '${cert.img}')">
                            <div class="holo-shine"></div>
                            <div class="scanner-bar"></div>
                            
                            <div class="relative w-full h-48 mb-4 overflow-hidden rounded-lg bg-black border border-gray-800 group-hover:border-${cert.color}-500/50 transition-colors">
                                ${vipBadge}
                                <img src="${cert.img}" alt="${cert.title}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700" onerror="this.src='https://placehold.co/600x400/05101a/22d3ee?text=Error&font=orbitron'">
                                <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-sm px-2 py-1 rounded border border-${cert.color}-500/50 z-20">
                                    <i class="${cert.icon} text-${cert.color}-400 text-xs"></i>
                                </div>
                            </div>

                            <div class="flex-grow">
                                <h3 class="text-white font-orbitron text-lg font-bold group-hover:text-${cert.color}-400 transition-colors mb-2">${cert.title}</h3>
                                <p class="text-gray-400 text-xs font-mono mb-4 leading-relaxed">${cert.desc}</p>
                            </div>

                            <div class="border-t border-gray-700/50 pt-4 flex justify-between items-center mt-auto">
                                <span class="text-[10px] text-${cert.color}-300 font-mono bg-${cert.color}-900/20 px-2 py-1 rounded border border-${cert.color}-500/20 uppercase">${cert.tagText}</span>
                                <button class="expand-btn text-gray-400 hover:text-${cert.color}-400 transition-colors p-2 rounded-full hover:bg-${cert.color}-900/20" title="Maximize" onclick="openModal(event, '${cert.img}')">
                                    <i class="fas fa-expand-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
                delay += 0.05; // Faster stagger animation
            });

            initTiltEffect();
        }

        window.addEventListener('load', loadDatabase);

        // ==========================================
        // UI & ANIMATIONS
        // ==========================================

        function initTiltEffect() {
            const cards = document.querySelectorAll('.cert-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -10; 
                    const rotateY = ((x - centerX) / centerX) * 10;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
                });
            });
        }

        function fireConfettiSequence() {
            var defaults = { spread: 360, ticks: 50, gravity: 0, decay: 0.94, startVelocity: 30, colors: ['#22d3ee', '#bc13fe', '#39ff14', '#ffffff'] };
            function shoot() {
                // useWorker: false prevents Canvas errors in restricted iframe environments
                confetti({ ...defaults, particleCount: 40, scalar: 1.2, shapes: ['star'], useWorker: false });
                confetti({ ...defaults, particleCount: 10, scalar: 0.75, shapes: ['circle'], useWorker: false });
            }
            setTimeout(shoot, 0);
            setTimeout(shoot, 100);
            setTimeout(shoot, 200);
        }

        // --- Filtering Logic ---
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');
                const certItems = document.querySelectorAll('.cert-item');

                certItems.forEach(item => {
                    const category = item.getAttribute('data-category');
                    if (filterValue === 'all' || filterValue === category) {
                        item.style.display = 'block';
                        item.style.animation = 'none';
                        item.offsetHeight; 
                        item.style.animation = 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // --- Interactive Neural Network Background ---
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        const moon = document.getElementById('moon');
        let width, height, particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            if (moon) {
                const moveX = (e.clientX - window.innerWidth / 2) * -0.02; 
                const moveY = (e.clientY - window.innerHeight / 2) * -0.02;
                moon.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1; this.vy = (Math.random() - 0.5) * 1;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? '#22d3ee' : '#bc13fe'; 
            }
            update() {
                if (mouse.x != null) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance; const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += forceDirectionX * force * 2; this.y += forceDirectionY * force * 2;
                    }
                }
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(window.innerWidth / 10, 80);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        const opacity = 1 - (distance / 120);
                        ctx.strokeStyle = `rgba(188, 19, 254, ${opacity * 0.3})`;
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initParticles(); });
        resize(); initParticles(); animate();

        // --- Audio Control ---
        const audio = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        let isPlaying = false;

        function updateMusicIcon() {
            const icon = musicBtn.querySelector('i');
            if (isPlaying) {
                icon.className = 'fas fa-pause';
                musicBtn.classList.add('animate-pulse', 'border-cyan-400'); 
            } else {
                icon.className = 'fas fa-music';
                musicBtn.classList.remove('animate-pulse', 'border-cyan-400');
            }
        }

        function safePlay() {
            if (isPlaying) return; 
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { isPlaying = true; updateMusicIcon(); })
                .catch(error => { console.log("Playback failed:", error); isPlaying = false; updateMusicIcon(); });
            }
        }

        function safePause() {
            if (!isPlaying) return;
            isPlaying = false; updateMusicIcon(); audio.pause();
        }

        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (isPlaying) safePause(); else safePlay();
        });

        function handleInteraction() {
            if (!isPlaying) safePlay();
            if (isPlaying) {
                ['click', 'keydown', 'touchstart', 'scroll', 'mousemove'].forEach(event => {
                    window.removeEventListener(event, handleInteraction);
                });
            }
        }

        ['click', 'keydown', 'touchstart', 'scroll', 'mousemove'].forEach(event => {
            window.addEventListener(event, handleInteraction);
        });

        // --- Modal Logic ---
        const modal = document.getElementById('cert-modal');
        const modalImg = document.getElementById('modal-img');

        function openModal(e, imgSrc) {
            e.stopPropagation(); 
            modalImg.src = imgSrc;
            modal.classList.remove('hidden');
            
            const modalContent = modal.querySelector('div.relative');
            modalContent.style.animation = 'none';
            modalContent.offsetHeight; 
            modalContent.style.animation = 'modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
